<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 220 56" fill="none">
  <defs>
    <linearGradient id="iconGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#2563EB"/>
      <stop offset="100%" stop-color="#7C3AED"/>
    </linearGradient>
    <linearGradient id="textGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#2563EB"/>
      <stop offset="100%" stop-color="#7C3AED"/>
    </linearGradient>
  </defs>

  <!-- Icon background -->
  <rect x="0" y="4" width="48" height="48" rx="12" fill="url(#iconGrad)"/>

  <!-- Magnifying glass lens -->
  <circle cx="21" cy="22" r="11" stroke="white" stroke-width="3" fill="rgba(255,255,255,0.1)"/>

  <!-- Briefcase body inside lens -->
  <rect x="14" y="21" width="14" height="9" rx="1.5" fill="white"/>
  <!-- Briefcase handle -->
  <path d="M17.5 21 v-2.5 a3.5 3.5 0 0 1 7 0 v2.5" stroke="white" stroke-width="2.2" stroke-linecap="round" fill="none"/>
  <!-- Briefcase clasp / center line -->
  <rect x="19.5" y="24.5" width="3" height="2.5" rx="0.8" fill="rgba(37,99,235,0.4)"/>

  <!-- Magnifying glass handle -->
  <line x1="29.5" y1="29.5" x2="37" y2="37" stroke="white" stroke-width="3.5" stroke-linecap="round"/>

  <!-- Wordmark -->
  <text x="62" y="36" font-family="Inter, -apple-system, BlinkMacSystemFont, sans-serif" font-size="22" font-weight="800" fill="url(#textGrad)">JobHunter</text>
</svg>
