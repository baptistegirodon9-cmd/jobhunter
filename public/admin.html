<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>JobHunter — Admin</title>
  <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg:      #0f172a;
      --surface: #1e293b;
      --border:  #334155;
      --text:    #e2e8f0;
      --muted:   #94a3b8;
      --primary: #3b82f6;
      --success: #22c55e;
      --warn:    #f59e0b;
      --danger:  #ef4444;
      --radius:  10px;
    }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }

    /* ── Login screen ── */
    #login-screen {
      display: flex; align-items: center; justify-content: center;
      min-height: 100vh; padding: 24px;
    }
    .login-card {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 16px; padding: 40px; width: 100%; max-width: 380px;
      box-shadow: 0 25px 50px rgba(0,0,0,.5);
    }
    .login-logo { font-size: 28px; font-weight: 800; color: var(--primary); margin-bottom: 6px; }
    .login-sub { font-size: 13px; color: var(--muted); margin-bottom: 28px; }
    .login-label { font-size: 13px; font-weight: 600; display: block; margin-bottom: 6px; color: var(--muted); }
    .login-input {
      width: 100%; background: var(--bg); border: 1.5px solid var(--border);
      color: var(--text); border-radius: 8px; padding: 10px 14px;
      font-size: 14px; outline: none; margin-bottom: 16px; transition: border-color .2s;
    }
    .login-input:focus { border-color: var(--primary); }
    .login-btn {
      width: 100%; background: var(--primary); color: #fff; border: none;
      padding: 11px; border-radius: 8px; font-size: 14px; font-weight: 600;
      cursor: pointer; transition: background .2s;
    }
    .login-btn:hover { background: #2563eb; }
    .login-error { font-size: 13px; color: var(--danger); margin-top: 12px; display: none; }

    /* ── Dashboard ── */
    #dashboard { display: none; }

    header {
      background: var(--surface); border-bottom: 1px solid var(--border);
      padding: 0 24px; position: sticky; top: 0; z-index: 50;
    }
    .header-inner {
      max-width: 1100px; margin: 0 auto;
      display: flex; align-items: center; justify-content: space-between;
      height: 56px; gap: 20px;
    }
    .logo { font-size: 18px; font-weight: 800; color: var(--primary); display: flex; align-items: center; gap: 8px; }
    .logo-badge { background: #1d4ed8; color: #fff; font-size: 10px; padding: 2px 7px; border-radius: 20px; font-weight: 700; text-transform: uppercase; letter-spacing: .5px; }
    .header-actions { display: flex; align-items: center; gap: 10px; }
    .btn { padding: 8px 16px; border-radius: 8px; font-size: 13px; font-weight: 600; cursor: pointer; transition: all .2s; border: none; }
    .btn-primary { background: var(--primary); color: #fff; }
    .btn-primary:hover { background: #2563eb; }
    .btn-ghost { background: transparent; color: var(--muted); border: 1.5px solid var(--border); }
    .btn-ghost:hover { color: var(--text); border-color: #475569; }
    .btn-danger { background: var(--danger); color: #fff; }

    .content { max-width: 1100px; margin: 0 auto; padding: 28px 24px; }

    /* ── Stat cards ── */
    .stat-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px; margin-bottom: 28px; }
    .stat-card {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: var(--radius); padding: 20px;
    }
    .stat-label { font-size: 12px; color: var(--muted); text-transform: uppercase; letter-spacing: .6px; margin-bottom: 8px; }
    .stat-value { font-size: 28px; font-weight: 800; }
    .stat-sub { font-size: 12px; color: var(--muted); margin-top: 4px; }
    .stat-card.success .stat-value { color: var(--success); }
    .stat-card.warn    .stat-value { color: var(--warn); }
    .stat-card.danger  .stat-value { color: var(--danger); }
    .stat-card.primary .stat-value { color: var(--primary); }

    /* ── Source table ── */
    .section { margin-bottom: 28px; }
    .section-title { font-size: 15px; font-weight: 700; margin-bottom: 14px; display: flex; align-items: center; gap: 8px; }
    .section-title span { font-size: 12px; color: var(--muted); font-weight: 400; }

    .source-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; }
    .source-card {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: var(--radius); padding: 16px;
    }
    .source-name { font-size: 14px; font-weight: 700; margin-bottom: 4px; }
    .source-count { font-size: 22px; font-weight: 800; color: var(--primary); margin-bottom: 4px; }
    .source-status { font-size: 12px; display: flex; align-items: center; gap: 4px; }
    .dot { width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0; }
    .dot-success { background: var(--success); }
    .dot-error   { background: var(--danger); }
    .dot-unknown { background: var(--muted); }

    /* ── Logs table ── */
    .logs-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 14px; }
    .table-wrap { overflow-x: auto; }
    table { width: 100%; border-collapse: collapse; font-size: 13px; }
    thead th {
      background: #0f172a; color: var(--muted);
      text-align: left; font-size: 11px; font-weight: 700;
      text-transform: uppercase; letter-spacing: .6px;
      padding: 10px 14px; border-bottom: 1px solid var(--border);
      white-space: nowrap;
    }
    tbody tr { border-bottom: 1px solid var(--border); transition: background .15s; }
    tbody tr:hover { background: rgba(255,255,255,.03); }
    tbody td { padding: 10px 14px; color: var(--text); vertical-align: middle; }
    .badge-sm {
      display: inline-flex; align-items: center; gap: 4px;
      font-size: 11px; font-weight: 700; padding: 2px 8px; border-radius: 20px;
    }
    .badge-success { background: rgba(34,197,94,.12); color: var(--success); }
    .badge-error   { background: rgba(239,68,68,.12);  color: var(--danger); }
    .text-muted { color: var(--muted); }
    .text-right { text-align: right; }

    /* ── Refresh spinner ── */
    .spinning { animation: spin .8s linear infinite; display: inline-block; }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Toast ── */
    #toast { position: fixed; bottom: 24px; right: 24px; z-index: 999; }
    .toast {
      background: #1e293b; color: #fff; border: 1px solid var(--border);
      padding: 12px 18px; border-radius: var(--radius); font-size: 13px;
      box-shadow: 0 10px 25px rgba(0,0,0,.4); animation: pop .3s ease;
    }
    .toast.success { border-color: var(--success); }
    .toast.error   { border-color: var(--danger); }
    @keyframes pop { from { opacity:0; transform:translateY(8px); } }

    @media (max-width: 768px) {
      .stat-grid   { grid-template-columns: 1fr 1fr; }
      .source-grid { grid-template-columns: 1fr 1fr; }
    }
    @media (max-width: 480px) {
      .stat-grid   { grid-template-columns: 1fr; }
      .source-grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>

<!-- ── Login ──────────────────────────────────────────────────────────────── -->
<div id="login-screen">
  <div class="login-card">
    <div class="login-logo">
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 220 56" fill="none" style="height:40px;width:auto;margin-bottom:4px;">
        <defs>
          <linearGradient id="lgIconGrad" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#3B82F6"/>
            <stop offset="100%" stop-color="#8B5CF6"/>
          </linearGradient>
          <linearGradient id="lgTextGrad" x1="0%" y1="0%" x2="100%" y2="0%">
            <stop offset="0%" stop-color="#60A5FA"/>
            <stop offset="100%" stop-color="#A78BFA"/>
          </linearGradient>
        </defs>
        <rect x="0" y="4" width="48" height="48" rx="12" fill="url(#lgIconGrad)"/>
        <circle cx="21" cy="22" r="11" stroke="white" stroke-width="3" fill="rgba(255,255,255,0.1)"/>
        <rect x="14" y="21" width="14" height="9" rx="1.5" fill="white"/>
        <path d="M17.5 21 v-2.5 a3.5 3.5 0 0 1 7 0 v2.5" stroke="white" stroke-width="2.2" stroke-linecap="round" fill="none"/>
        <rect x="19.5" y="24.5" width="3" height="2.5" rx="0.8" fill="rgba(37,99,235,0.4)"/>
        <line x1="29.5" y1="29.5" x2="37" y2="37" stroke="white" stroke-width="3.5" stroke-linecap="round"/>
        <text x="62" y="36" font-family="Inter, -apple-system, sans-serif" font-size="22" font-weight="800" fill="url(#lgTextGrad)">JobHunter</text>
      </svg>
    </div>
    <div class="login-sub">Tableau de bord d'administration</div>
    <label class="login-label" for="pwd-input">Mot de passe admin</label>
    <input class="login-input" type="password" id="pwd-input" placeholder="Entrez votre ADMIN_PASSWORD"
           onkeydown="if(event.key==='Enter') doLogin()" />
    <button class="login-btn" onclick="doLogin()">Connexion</button>
    <div class="login-error" id="login-error">Mot de passe incorrect.</div>
  </div>
</div>

<!-- ── Dashboard ─────────────────────────────────────────────────────────── -->
<div id="dashboard">
  <header>
    <div class="header-inner">
      <div class="logo">
        🎯 JobHunter
        <span class="logo-badge">Admin</span>
      </div>
      <div class="header-actions">
        <button class="btn btn-primary" id="btn-refresh" onclick="triggerRefresh()">↻ Lancer un rafraîchissement</button>
        <a href="/" style="text-decoration:none"><button class="btn btn-ghost">← Front</button></a>
        <button class="btn btn-ghost" onclick="logout()">Déconnexion</button>
      </div>
    </div>
  </header>

  <div class="content">

    <!-- Stat cards -->
    <div class="stat-grid" id="stat-grid">
      <div class="stat-card primary"><div class="stat-label">Offres actives</div><div class="stat-value" id="s-total">—</div></div>
      <div class="stat-card success"><div class="stat-label">Scrapers OK</div><div class="stat-value" id="s-ok">—</div></div>
      <div class="stat-card danger"><div class="stat-label">Scrapers en erreur</div><div class="stat-value" id="s-err">—</div></div>
      <div class="stat-card warn"><div class="stat-label">Dernière MàJ</div><div class="stat-value" id="s-updated" style="font-size:16px;padding-top:6px">—</div></div>
    </div>

    <!-- Source breakdown -->
    <div class="section">
      <div class="section-title">Sources <span>— offres actives par source</span></div>
      <div class="source-grid" id="source-grid">
        <!-- filled by JS -->
      </div>
    </div>

    <!-- Scraper logs -->
    <div class="section">
      <div class="logs-header">
        <div class="section-title" style="margin:0">Journal des scrapers <span id="logs-count"></span></div>
        <button class="btn btn-ghost" style="font-size:12px" onclick="loadLogs()">⟳ Actualiser</button>
      </div>
      <div class="table-wrap">
        <table id="logs-table">
          <thead>
            <tr>
              <th>#</th>
              <th>Source</th>
              <th>Statut</th>
              <th>Trouvées</th>
              <th>Insérées</th>
              <th>Mises à jour</th>
              <th>Durée</th>
              <th>Démarré le</th>
              <th>Erreur</th>
            </tr>
          </thead>
          <tbody id="logs-body">
            <tr><td colspan="9" class="text-muted" style="padding:20px;text-align:center">Chargement…</td></tr>
          </tbody>
        </table>
      </div>
    </div>

  </div>
</div>

<div id="toast"></div>

<script>
  const SOURCE_LABELS = { indeed:'Indeed', francetravail:'France Travail', wttj:'WTTJ', linkedin:'LinkedIn', remotive:'Remotive', remoteok:'RemoteOK', himalayas:'Himalayas', jobicy:'Jobicy', themuse:'TheMuse' };
  let adminToken = null;

  // ── Auth ──────────────────────────────────────────────────────────────────
  window.addEventListener('DOMContentLoaded', () => {
    const saved = sessionStorage.getItem('jr_admin_token');
    if (saved) { adminToken = saved; showDashboard(); }
  });

  async function doLogin() {
    const pwd = document.getElementById('pwd-input').value;
    const err = document.getElementById('login-error');
    err.style.display = 'none';

    try {
      const res  = await fetch('/api/admin/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ password: pwd }),
      });
      const data = await res.json();
      if (!res.ok) throw new Error(data.error);
      adminToken = data.token;
      sessionStorage.setItem('jr_admin_token', adminToken);
      showDashboard();
    } catch {
      err.style.display = 'block';
    }
  }

  function logout() {
    sessionStorage.removeItem('jr_admin_token');
    adminToken = null;
    document.getElementById('dashboard').style.display = 'none';
    document.getElementById('login-screen').style.display = 'flex';
  }

  function showDashboard() {
    document.getElementById('login-screen').style.display = 'none';
    document.getElementById('dashboard').style.display = 'block';
    loadStats();
    loadLogs();
  }

  // ── API helpers ───────────────────────────────────────────────────────────
  async function api(path, method = 'GET', body = null) {
    const res = await fetch(path, {
      method,
      headers: { 'Content-Type': 'application/json', 'x-admin-token': adminToken },
      body: body ? JSON.stringify(body) : null,
    });
    if (res.status === 401) { logout(); throw new Error('Unauthorized'); }
    return res.json();
  }

  // ── Stats ─────────────────────────────────────────────────────────────────
  async function loadStats() {
    try {
      const data = await api('/api/admin/stats');

      document.getElementById('s-total').textContent = data.total.toLocaleString('fr-FR');

      // Source breakdown
      const grid = document.getElementById('source-grid');
      grid.innerHTML = (data.by_source ?? []).map(s => {
        const lastLog = null; // could be enriched later
        return `
          <div class="source-card">
            <div class="source-name">${SOURCE_LABELS[s.source] ?? s.source}</div>
            <div class="source-count">${s.count.toLocaleString('fr-FR')}</div>
            <div class="source-status text-muted">offres actives</div>
          </div>`;
      }).join('') || '<div class="text-muted" style="padding:12px">Aucune donnée</div>';

      if (data.last_updated) {
        const d = new Date(data.last_updated);
        document.getElementById('s-updated').textContent = d.toLocaleString('fr-FR', { day:'2-digit', month:'short', hour:'2-digit', minute:'2-digit' });
      }
    } catch (err) {
      showToast('Erreur chargement stats : ' + err.message, 'error');
    }
  }

  // ── Logs ──────────────────────────────────────────────────────────────────
  async function loadLogs() {
    try {
      const logs = await api('/api/admin/logs');
      document.getElementById('logs-count').textContent = `— ${logs.length} entrées`;

      // Compute OK / error counts from the most recent run per source
      const latestBySource = {};
      for (const log of logs) {
        if (!latestBySource[log.source]) latestBySource[log.source] = log;
      }
      const sources = Object.values(latestBySource);
      document.getElementById('s-ok').textContent  = sources.filter(s => s.status === 'success').length;
      document.getElementById('s-err').textContent = sources.filter(s => s.status === 'error').length;

      const body = document.getElementById('logs-body');
      if (!logs.length) {
        body.innerHTML = '<tr><td colspan="9" class="text-muted" style="text-align:center;padding:24px">Aucun log — lancez un rafraîchissement.</td></tr>';
        return;
      }

      body.innerHTML = logs.map(log => {
        const started   = new Date(log.started_at);
        const completed = log.completed_at ? new Date(log.completed_at) : null;
        const duration  = completed ? `${Math.round((completed - started) / 100) / 10}s` : '—';
        const label     = SOURCE_LABELS[log.source] ?? log.source;
        const statusBadge = log.status === 'success'
          ? `<span class="badge-sm badge-success">✔ Succès</span>`
          : `<span class="badge-sm badge-error">✖ Erreur</span>`;

        const errCell = log.error_message
          ? `<span title="${esc(log.error_message)}" style="cursor:help;color:var(--danger)">⚠ ${esc(log.error_message.slice(0, 60))}…</span>`
          : '<span class="text-muted">—</span>';

        return `
          <tr>
            <td class="text-muted">${log.id}</td>
            <td><strong>${label}</strong></td>
            <td>${statusBadge}</td>
            <td>${log.jobs_found ?? '—'}</td>
            <td>${log.jobs_inserted ?? '—'}</td>
            <td>${log.jobs_updated ?? '—'}</td>
            <td class="text-muted">${duration}</td>
            <td class="text-muted">${started.toLocaleString('fr-FR', { day:'2-digit', month:'short', hour:'2-digit', minute:'2-digit' })}</td>
            <td style="max-width:220px;overflow:hidden">${errCell}</td>
          </tr>`;
      }).join('');
    } catch (err) {
      showToast('Erreur chargement logs : ' + err.message, 'error');
    }
  }

  // ── Manual refresh ────────────────────────────────────────────────────────
  async function triggerRefresh() {
    const btn = document.getElementById('btn-refresh');
    btn.innerHTML = '<span class="spinning">↻</span> En cours…';
    btn.disabled = true;

    try {
      await api('/api/admin/refresh', 'POST');
      showToast('Rafraîchissement lancé ! Les logs se mettront à jour dans quelques instants.', 'success');
      setTimeout(() => { loadStats(); loadLogs(); }, 6000);
    } catch (err) {
      showToast('Erreur : ' + err.message, 'error');
    } finally {
      setTimeout(() => {
        btn.innerHTML = '↻ Lancer un rafraîchissement';
        btn.disabled = false;
      }, 3000);
    }
  }

  // ── Helpers ───────────────────────────────────────────────────────────────
  function esc(s) {
    return String(s ?? '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  function showToast(msg, type = '') {
    const el = document.getElementById('toast');
    el.innerHTML = `<div class="toast ${type}">${msg}</div>`;
    setTimeout(() => el.innerHTML = '', 4500);
  }
</script>
</body>
</html>
